# Example extraction spec for soi-frame-extractor
#
# Every rule must have interval_s.
# Optional rule arguments: periods, constraints
#   periods:
#     - start: start time (ISO 8601 UTC, e.g. "2025-10-15T10:25:00Z")
#       end:   end time
#   constraints:
#     - column: canonical sensor name (left-hand side of your mappings block)
#       max:    maximum value (only frames where column <= max are included)
#       min:    minimum value (only frames where column >= min are included)
#
# Rule composition:
#   Same rule  — periods and constraints are INTERSECTED
#                (frames only where all conditions are simultaneously met)
#   Diff rules — UNIONED
#                (each rule contributes independently; duplicates removed)
#
# Usage:
#   soi-extract <source> --spec extraction_spec.yaml [--data sensors.csv] [--output ./frames]


# ---------------------------------------------------------------------------
# RULES (required)
# ---------------------------------------------------------------------------

rules:

  # 1 frame every 10s for the entire session
  - interval_s: 10.0

  # 1 frame every 2s during a specific UTC window
  - interval_s: 2.0
    periods:
      - start: "2025-11-15T10:25:00Z"
        end:   "2025-11-15T10:30:00Z"

  # 1 frame every 30s during an overlapping UTC window
  - interval_s: 30.0
    periods:
      - start: "2025-11-15T10:20:00Z"
        end:   "2025-11-15T10:50:00Z"

  # 1 frame every 5s while depth is between 1000–1200 m
  - interval_s: 5.0
    constraints:
      - column: depth
        min: 1000
        max: 1200

  # 1 frame every 2s — UTC window AND depth < 500 m AND temperature 2–4 C (intersected)
  - interval_s: 2.0
    periods:
      - start: "2025-11-15T10:25:00Z"
        end:   "2025-11-15T10:30:00Z"
    constraints:
      - column: depth
        max: 500
      - column: temperature
        min: 2.0
        max: 4.0


# ---------------------------------------------------------------------------
# MAPPINGS (required only if a sensor CSV is provided)
# ---------------------------------------------------------------------------
#
# Tell the tool which columns to read from your CSV and what to call them.
#
#     name_for_this_tool: Column Name In Your CSV
#
# Left side  — the name the tool uses internally: in constraint rules above,
#              in filename template variables, and in image metadata output.
#              Use only letters, numbers, and underscores.  No spaces or
#              special characters (e.g. write "velocityfwd" not "velocity_m/s").
#
# Right side — the exact column header as it appears in your CSV file.
#              Copy it exactly, including any spaces or special characters.
#              The tool reads by column name, so "VelocityFwd_m/s" is fine.
#
# Only the columns you list here are loaded.  Every other column in your CSV
# is silently ignored — you do not need to remove them from the file.
#
# The names on the LEFT side determine where values end up in output metadata.
# The tool recognises these specific names and writes them automatically to
# the correct fields in EXIF, iFDO, and image files:
#
#   latitude  → GPS latitude  in image EXIF (GPSLatitude)  and iFDO manifest
#   longitude → GPS longitude in image EXIF (GPSLongitude) and iFDO manifest
#   depth     → depth in image EXIF (GPSAltitude, tagged below sea level) and iFDO
#   altitude  → altitude above seafloor in iFDO manifest (image-altitude-meters)
#   heading   → vehicle heading in iFDO manifest (image-heading)
#   pitch     → vehicle pitch   in iFDO manifest (image-pitch)
#   roll      → vehicle roll    in iFDO manifest (image-roll)
#
# Any other name you choose is also fine — the data is still stored and written
# to the XMP layer of each image, just not to EXIF or iFDO.
# Example: mapping "z: Depth_m" works, but the depth will only appear in XMP,
# not in EXIF GPS fields.  Mapping "depth: Depth_m" puts it in all three.
#
# mappings:
#
#   # required — which column in your CSV holds the UTC timestamp
#   timestamp:   Timestamp
#
#   # use these exact names on the left for automatic EXIF + iFDO output
#   latitude:    Latitude_ddeg     # decimal degrees only (e.g. -44.2895); negative = south
#                                   # DMS and degrees-decimal-minutes are not supported — convert first
#   longitude:   Longitude_ddeg    # decimal degrees only (e.g. -59.9191); negative = west; 0–360 also accepted
#                                   # DMS and degrees-decimal-minutes are not supported — convert first
#   depth:       Depth_m           # positive number, metres below sea surface
#   altitude:    Altitude_m        # metres above the seafloor
#   heading:     HeadingTrue_deg   # degrees, 0–360, clockwise from north
#   pitch:       Pitch_deg
#   roll:        Roll_deg
#
#   # any other columns you want — name them whatever makes sense to you
#   # they will be saved and written to XMP metadata in each image
#   temperature: Temp_degC
#   salinity:    Salinity_psu
#   velocityfwd: VelocityFwd_m/s   # the right side can have slashes, the left cannot


# ---------------------------------------------------------------------------
# METADATA (optional)
# ---------------------------------------------------------------------------
# Arbitrary key/value pairs embedded in every output frame.
# All values are treated as strings.
# Fill in what is relevant to your deployment and remove the rest.
#
# metadata:
#
#   # iFDO fields — written to iFDO image-* fields
#   cruise_id:    FK250101          # → image-sequence-name
#   dive_id:      S0042             # → image-deployment-id
#   vehicle:      SuBastian         # → image-platform.name  (nested object)
#   pi_name:      "Lastname, F."    # → image-pi.name        (nested object)
#   pi_orcid:     "0000-0000-0000-0000"  # → image-pi.orcid  (nested object)
#   project:      "Deep-sea coral survey"
#   license:      "CC BY 4.0"
#
#   # IPTC fields — written to IPTC layer
#   credit:       "Schmidt Ocean Institute"
#   source:       "ROV SuBastian"
#   copyright:    "© 2025 Schmidt Ocean Institute"
#   caption:      "Description of image content"
#
#   # EXIF fields — written to EXIF layer
#   camera_make:  "Imenco"
#   camera_model: "Birdseye 4K"
#
#   # anything else — written to XMP custom namespace (see xmp_namespace_* below)
#   institution:  MBARI
#   expedition:   "FK250101 Coral Survey"


# ---------------------------------------------------------------------------
# FILENAME TEMPLATE (optional)
# ---------------------------------------------------------------------------
# Python format string for output image filenames.
# Omit to use the default: {utc}_{video_stem}.jpg
#
# Available variables:
#   {utc}         — UTC timestamp of the frame (20251115T102530123456)
#   {video_stem}  — source video filename without extension
#   {offset_s}    — seconds from t=0 in the source video
#   {<key>}       — any canonical sensor key (left-hand side of mappings block)
#                   e.g. {depth}, {latitude}, {longitude}, {temperature}
#   {<key>}       — any key from the metadata block, e.g. {dive_id}, {cruise_id}
#
# Use only the variables you want — omit the rest.
# If the template cannot be rendered (missing key, bad syntax), the writer
# warns to stderr and falls back to the default.
#
# STRONGLY RECOMMENDED: always include {utc} in your template.
# The planner guarantees unique timestamps, so {utc} guarantees unique
# filenames.  Templates that omit {utc} may silently overwrite frames
# if any other variable (e.g. depth, latitude) repeats across frames.
#
# filename_template: "{dive_id}_{depth}m_T{utc}.jpg"
# filename_template: "{latitude}_{longitude}_{utc}.tif"
# filename_template: "{cruise_id}_{video_stem}_{utc}.jpg"


# ---------------------------------------------------------------------------
# INITIAL OFFSET (optional)
# ---------------------------------------------------------------------------
# Shift the sampling grid this many seconds from the start of the session.
# Applies to every rule — this is a session-level setting, not per-rule.
#
# Default (0): sampling starts at the first frame of the first video.
#
# Use this if your sampling interval lands in a known gap between video
# files and you want to shift the grid to avoid it, or if your science
# requires frames to start at a specific offset into the dive.
#
# Example: interval_s=30 with initial_offset_s=10 gives frames at
#   session_start+10s, +40s, +70s, +100s, ...  instead of
#   session_start+0s,  +30s, +60s, +90s, ...
#
# If a sampling timestamp lands in a gap between video files the tool
# will warn you: "no frame extracted at t=####". Adjusting this value
# can shift the grid to avoid that gap.
#
# initial_offset_s: 0.0


# ---------------------------------------------------------------------------
# OUTPUT MODE (optional)
# ---------------------------------------------------------------------------
# Controls whether frames are buffered per video or written immediately.
#
# Default (false): frames are buffered for each video and written after that
#   video is fully extracted.  Memory usage scales with frames per video:
#     4K @ 10s intervals, 10-min video → ~60 frames  (~1.4 GB)
#     4K @  1s intervals, 10-min video → ~600 frames (~14.4 GB)
#
# Set to true if your machine cannot hold a full video's worth of frames in
#   memory.  Frames are written to disk one at a time as they are decoded.
#
# stream_output: false


# ---------------------------------------------------------------------------
# XMP NAMESPACE (optional)
# ---------------------------------------------------------------------------
# Sensor columns and project_metadata keys not routed to EXIF/IPTC/iFDO are
# written to XMP under a custom namespace.  Set URI and prefix here, or omit
# to use the defaults shown.
#
# xmp_namespace_uri:    https://soi-frame-extractor.org/xmp/v1/
# xmp_namespace_prefix: sfe
